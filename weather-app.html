<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline — weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #17223B;
    --sky: #4C7EA8;
    --mist: #EAF1F6;
    --sun: #E8A947;
    --rain: #2F7D6E;
    --cloud: #8C97A6;
    --card: #FFFFFF;
    --ink: #17223B;
    --ink-soft: #5B6577;
    --line: rgba(23,34,59,0.09);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter', sans-serif;
    background: linear-gradient(180deg, #6E9AC4 0%, #DDE9F2 55%, var(--mist) 100%);
    color: var(--ink);
    display:flex;
    justify-content:center;
    padding: 32px 16px 64px;
  }
  .app{
    width:100%;
    max-width: 480px;
  }
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
    padding: 0 4px;
  }
  .brand h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:-0.02em;
    color: var(--navy);
    margin:0;
  }
  .brand span{
    font-size:12px;
    color: var(--ink-soft);
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .search{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .search input{
    flex:1;
    height:46px;
    border-radius:12px;
    border:1px solid var(--line);
    background: rgba(255,255,255,0.75);
    padding: 0 14px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    color: var(--ink);
    outline:none;
  }
  .search input::placeholder{ color: #94A0B3; }
  .search input:focus{ border-color: var(--sky); background:#fff; }
  .search button{
    width:46px;
    height:46px;
    border-radius:12px;
    border:1px solid var(--line);
    background: var(--navy);
    color:#fff;
    font-size:18px;
    cursor:pointer;
    flex-shrink:0;
  }
  .search button:hover{ background:#243257; }
  .search .locate{
    background: rgba(255,255,255,0.75);
    color: var(--navy);
  }
  .search .locate:hover{ background:#fff; }

  .card{
    background: var(--card);
    border-radius: 20px;
    padding: 26px 24px;
    box-shadow: 0 20px 40px -24px rgba(23,34,59,0.35);
    margin-bottom:16px;
  }
  .status{ font-size:14px; color: var(--ink-soft); padding: 12px 4px; text-align:center; }
  .status.error{ color:#B23A3A; }

  .place{
    font-size:14px;
    color: var(--ink-soft);
    margin-bottom:2px;
  }
  .place strong{ color: var(--navy); font-weight:600; }
  .now{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin: 10px 0 6px;
  }
  .temp{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:64px;
    line-height:1;
    color: var(--navy);
  }
  .temp sup{ font-size:28px; font-weight:500; }
  .cond{ text-align:right; }
  .cond .icon{ font-size:40px; line-height:1; }
  .cond .label{ font-size:14px; color: var(--ink-soft); margin-top:4px; }
  .feels{ font-size:13px; color: var(--ink-soft); margin-bottom:18px; }

  .rainbox{
    background: linear-gradient(135deg, rgba(47,125,110,0.08), rgba(47,125,110,0.02));
    border: 1px solid rgba(47,125,110,0.18);
    border-radius:14px;
    padding: 14px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
  }
  .rainbox .drop{ font-size:26px; }
  .rainbox .meter{ flex:1; }
  .rainbox .meter-top{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color: var(--ink-soft);
    margin-bottom:6px;
  }
  .rainbox .pct{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    color: var(--rain);
  }
  .meter-track{
    height:8px;
    border-radius:6px;
    background: rgba(23,34,59,0.08);
    overflow:hidden;
  }
  .meter-fill{
    height:100%;
    background: var(--rain);
    border-radius:6px;
    transition: width 0.5s ease;
  }

  .stats{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
    margin-bottom: 4px;
  }
  .stat{
    background: var(--mist);
    border-radius:12px;
    padding:10px 8px;
    text-align:center;
  }
  .stat .v{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:16px; color:var(--navy); }
  .stat .k{ font-size:11px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; margin-top:2px; }

  .section-title{
    font-size:13px;
    font-weight:600;
    color: var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin: 22px 4px 10px;
  }
  .hourly{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:6px;
  }
  .hour{
    flex:0 0 auto;
    width:64px;
    background: var(--mist);
    border-radius:12px;
    padding:10px 6px;
    text-align:center;
  }
  .hour .t{ font-size:12px; color: var(--ink-soft); margin-bottom:6px; }
  .hour .ic{ font-size:20px; margin-bottom:6px; }
  .hour .tv{ font-size:13px; font-weight:600; color: var(--navy); }
  .hour .rp{ font-size:11px; color: var(--rain); margin-top:4px; }

  .daily{ display:flex; flex-direction:column; gap:2px; }
  .day{
    display:flex;
    align-items:center;
    padding: 10px 4px;
    border-bottom: 1px solid var(--line);
    gap: 10px;
  }
  .day:last-child{ border-bottom:none; }
  .day .dname{ width:64px; font-size:13px; font-weight:500; color: var(--navy); }
  .day .dic{ font-size:18px; width:28px; }
  .day .drp{ font-size:12px; color: var(--rain); width:40px; }
  .day .drange{ flex:1; display:flex; align-items:center; gap:8px; font-size:13px; color: var(--ink-soft); justify-content:flex-end; }
  .day .drange .hi{ color: var(--navy); font-weight:600; }

  .hint{
    text-align:center;
    font-size:12px;
    color: var(--ink-soft);
    margin-top: 10px;
  }
  ::-webkit-scrollbar{ height:6px; }
  ::-webkit-scrollbar-thumb{ background: rgba(23,34,59,0.15); border-radius:6px; }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <h1>Skyline</h1>
    <span>Weather, at a glance</span>
  </div>

  <div class="search">
    <input id="cityInput" type="text" placeholder="Search a city, e.g. Agra" />
    <button class="locate" id="locateBtn" title="Use my location">&#8982;</button>
    <button id="searchBtn" title="Search">&#8594;</button>
  </div>

  <div id="content">
    <div class="status">Search a city or use your location to see the forecast.</div>
  </div>
</div>

<script>
const WEATHER_CODES = {
  0:  ["Clear sky", "&#9728;"],
  1:  ["Mostly clear", "&#9728;"],
  2:  ["Partly cloudy", "&#9925;"],
  3:  ["Overcast", "&#9729;"],
  45: ["Foggy", "&#9729;"],
  48: ["Foggy", "&#9729;"],
  51: ["Light drizzle", "&#127783;"],
  53: ["Drizzle", "&#127783;"],
  55: ["Heavy drizzle", "&#127783;"],
  56: ["Freezing drizzle", "&#127783;"],
  57: ["Freezing drizzle", "&#127783;"],
  61: ["Light rain", "&#127783;"],
  63: ["Rain", "&#127783;"],
  65: ["Heavy rain", "&#127783;"],
  66: ["Freezing rain", "&#127783;"],
  67: ["Freezing rain", "&#127783;"],
  71: ["Light snow", "&#10052;"],
  73: ["Snow", "&#10052;"],
  75: ["Heavy snow", "&#10052;"],
  77: ["Snow grains", "&#10052;"],
  80: ["Light showers", "&#127783;"],
  81: ["Showers", "&#127783;"],
  82: ["Heavy showers", "&#127783;"],
  85: ["Snow showers", "&#10052;"],
  86: ["Snow showers", "&#10052;"],
  95: ["Thunderstorm", "&#9889;"],
  96: ["Thunderstorm, hail", "&#9889;"],
  99: ["Thunderstorm, hail", "&#9889;"]
};

function codeInfo(code){
  return WEATHER_CODES[code] || ["Unknown", "&#9729;"];
}

function round(n){ return Math.round(n); }

function dayName(dateStr, idx){
  if(idx === 0) return "Today";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString(undefined, { weekday: "short" });
}

function hourLabel(iso, isFirst){
  const d = new Date(iso);
  if(isFirst) return "Now";
  return d.toLocaleTimeString(undefined, { hour: "numeric" });
}

const content = document.getElementById("content");
const cityInput = document.getElementById("cityInput");

function setStatus(msg, isError){
  content.innerHTML = `<div class="status${isError ? " error" : ""}">${msg}</div>`;
}

async function geocode(name){
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("Geocoding failed");
  const data = await res.json();
  if(!data.results || data.results.length === 0) throw new Error("City not found. Try a different spelling.");
  const r = data.results[0];
  return { lat: r.latitude, lon: r.longitude, name: r.name, region: r.admin1, country: r.country };
}

async function reverseName(lat, lon){
  try{
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${lat}&count=1`;
    return { name: "Your location", region: "", country: "" };
  }catch(e){
    return { name: "Your location", region: "", country: "" };
  }
}

async function fetchWeather(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,precipitation_probability` +
    `&hourly=temperature_2m,precipitation_probability,weather_code` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
    `&timezone=auto&forecast_days=6`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("Weather lookup failed");
  return res.json();
}

function render(place, wx){
  const cur = wx.current;
  const [condLabel, condIcon] = codeInfo(cur.weather_code);

  const nowHourIdx = wx.hourly.time.findIndex(t => t === wx.current.time) ;
  const startIdx = nowHourIdx >= 0 ? nowHourIdx : 0;
  const rainChance = wx.hourly.precipitation_probability[startIdx] ?? 0;

  let hourlyHtml = "";
  for(let i = startIdx; i < Math.min(startIdx + 8, wx.hourly.time.length); i++){
    const [, icon] = codeInfo(wx.hourly.weather_code[i]);
    hourlyHtml += `
      <div class="hour">
        <div class="t">${hourLabel(wx.hourly.time[i], i === startIdx)}</div>
        <div class="ic">${icon}</div>
        <div class="tv">${round(wx.hourly.temperature_2m[i])}&deg;</div>
        <div class="rp">${round(wx.hourly.precipitation_probability[i])}%</div>
      </div>`;
  }

  let dailyHtml = "";
  for(let i = 0; i < wx.daily.time.length; i++){
    const [, icon] = codeInfo(wx.daily.weather_code[i]);
    dailyHtml += `
      <div class="day">
        <div class="dname">${dayName(wx.daily.time[i], i)}</div>
        <div class="dic">${icon}</div>
        <div class="drp">${round(wx.daily.precipitation_probability_max[i])}%</div>
        <div class="drange"><span>${round(wx.daily.temperature_2m_min[i])}&deg;</span><span class="hi">${round(wx.daily.temperature_2m_max[i])}&deg;</span></div>
      </div>`;
  }

  const locationLine = [place.region, place.country].filter(Boolean).join(", ");

  content.innerHTML = `
    <div class="card">
      <div class="place">Now in <strong>${place.name}</strong>${locationLine ? " &middot; " + locationLine : ""}</div>
      <div class="now">
        <div class="temp">${round(cur.temperature_2m)}<sup>&deg;C</sup></div>
        <div class="cond">
          <div class="icon">${condIcon}</div>
          <div class="label">${condLabel}</div>
        </div>
      </div>
      <div class="feels">Feels like ${round(cur.apparent_temperature)}&deg;</div>

      <div class="rainbox">
        <div class="drop">&#127783;</div>
        <div class="meter">
          <div class="meter-top">
            <span>Chance of rain</span>
            <span class="pct">${round(rainChance)}%</span>
          </div>
          <div class="meter-track"><div class="meter-fill" style="width:${round(rainChance)}%"></div></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><div class="v">${round(cur.relative_humidity_2m)}%</div><div class="k">Humidity</div></div>
        <div class="stat"><div class="v">${round(cur.wind_speed_10m)}</div><div class="k">Wind km/h</div></div>
        <div class="stat"><div class="v">${round(cur.precipitation)}</div><div class="k">Rain mm</div></div>
      </div>
    </div>

    <div class="section-title">Next hours</div>
    <div class="card" style="padding:16px;">
      <div class="hourly">${hourlyHtml}</div>
    </div>

    <div class="section-title">Next days</div>
    <div class="card" style="padding:8px 16px;">
      <div class="daily">${dailyHtml}</div>
    </div>

    <div class="hint">Data from Open-Meteo</div>
  `;
}

async function loadCity(name){
  try{
    setStatus("Looking up " + name + "...");
    const place = await geocode(name);
    setStatus("Fetching forecast...");
    const wx = await fetchWeather(place.lat, place.lon);
    render(place, wx);
  }catch(err){
    setStatus(err.message || "Something went wrong.", true);
  }
}

async function loadCoords(lat, lon){
  try{
    setStatus("Fetching forecast for your location...");
    const wx = await fetchWeather(lat, lon);
    render({ name: "Your location", region: "", country: "" }, wx);
  }catch(err){
    setStatus(err.message || "Something went wrong.", true);
  }
}

document.getElementById("searchBtn").addEventListener("click", () => {
  const v = cityInput.value.trim();
  if(v) loadCity(v);
});

cityInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    const v = cityInput.value.trim();
    if(v) loadCity(v);
  }
});

document.getElementById("locateBtn").addEventListener("click", () => {
  if(!navigator.geolocation){
    setStatus("Location is not available in this browser.", true);
    return;
  }
  setStatus("Getting your location...");
  navigator.geolocation.getCurrentPosition(
    pos => loadCoords(pos.coords.latitude, pos.coords.longitude),
    () => setStatus("Couldn't get your location. Try searching a city instead.", true)
  );
});

loadCity("Agra");
</script>
</body>
</html>
